function ReorderEditor({ item, onSaved }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(item.reorder_threshold ? fmtInvQty(parseFloat(item.reorder_threshold), item.unit).split(" ")[0] : "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const save = async () => {
    setSaving(true);
    try {
      const base = val ? toBaseUnit(val, item.unit) : null;
      await invUpsertItem({ id: item.id, reorder_threshold: base, updated_at: Date.now() });
      setEditing(false); setError("");
      onSaved && onSaved();
    } catch(e) { setError("Failed to save."); }
    setSaving(false);
  };

  return (
    <div className="detail-row" style={{ alignItems: "flex-start", flexDirection: "column", gap: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", width: "100%", alignItems: "center" }}>
        <span className="detail-key">Reorder At</span>
        {!editing && (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="detail-val">{item.reorder_threshold ? fmtInvQty(parseFloat(item.reorder_threshold), item.unit) : <span style={{ color: "#4a6a4a" }}>Not set</span>}</span>
            <button className="edit-icon-btn" onClick={() => setEditing(true)}>✏️ Edit</button>
          </div>
        )}
      </div>
      {editing && (
        <div style={{ width: "100%", marginTop: 4 }}>
          {error && <div className="error-banner">{error}</div>}
          <div className="input-row" style={{ marginBottom: 8 }}>
            <input
              type="number"
              placeholder={"Amount in " + item.unit}
              value={val}
              onChange={e => setVal(e.target.value)}
              autoFocus
            />
            <div style={{ display: "flex", alignItems: "center", padding: "0 12px", background: "#0f1a0f", border: "2px solid #2d4a2d", borderRadius: 8, color: "#7aaa50", fontSize: 14 }}>{item.unit}</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-primary" style={{ marginTop: 0, padding: "10px" }} onClick={save} disabled={saving}>{saving ? "Saving..." : "Save"}</button>
            <button className="btn btn-secondary" style={{ marginTop: 0, padding: "10px" }} onClick={() => { setEditing(false); setError(""); }}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- INVENTORY VIEW ----
function InventoryView() {
  const [tab, setTab] = useState("stock");
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [selected, setSelected] = useState(null);
  const [txHistory, setTxHistory] = useState([]);
  const [txLoading, setTxLoading] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showReceive, setShowReceive] = useState(null);
  const [showShipment, setShowShipment] = useState(false);
  const [showAdjust, setShowAdjust] = useState(null);
  const [tick, setTick] = useState(0);

  const load = useCallback(async () => {
    try { const data = await invGetItems(); setItems(data); setError(""); }
    catch(e) { setError("Could not load inventory."); }
    setLoading(false);
  }, []);

  useEffect(() => { setLoading(true); load(); }, [load, tick]);
  useEffect(() => { const t = setInterval(() => setTick(n => n+1), 3600000); return () => clearInterval(t); }, []);

  const refresh = () => { setLoading(true); setTick(n => n+1); };

  const openItem = async (item) => {
    setSelected(item); setTxLoading(true);
    try { const txs = await invGetTx(item.id); setTxHistory(txs); }
    catch(e) { setTxHistory([]); }
    setTxLoading(false);
  };

  const lowStock = (item) => item.reorder_threshold && parseFloat(item.quantity) <= parseFloat(item.reorder_threshold);

  if (selected) {
    return (
      <div>
        <button className="back-btn" onClick={() => { setSelected(null); refresh(); }}>← Back to Inventory</button>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase" }}>{selected.name}</div>
            {lowStock(selected) && <div style={{ color: "#d4aa40", fontSize: 12, marginTop: 4 }}>⚠️ Low Stock — below {fmtInvQty(parseFloat(selected.reorder_threshold), selected.unit)} threshold</div>}
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 40, fontWeight: 800, color: lowStock(selected) ? "#d4aa40" : "#4a8c2a", lineHeight: 1 }}>
              {fmtInvQty(parseFloat(selected.quantity), selected.unit)}
            </div>
            <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 2, textTransform: "uppercase" }}>In Stock</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={() => setShowReceive(selected)}>+ Receive Shipment</button>
          <button className="btn btn-secondary" style={{ marginTop: 0 }} onClick={() => setShowAdjust(selected)}>✏️ Adjust</button>
        </div>

        <div className="detail-section">
          <div className="detail-section-title"><span>📦 Item Details</span></div>
          <div className="detail-row"><span className="detail-key">Unit</span><span className="detail-val">{selected.unit}</span></div>
          <ReorderEditor item={selected} onSaved={async () => { const all = await invGetItems(); const fresh = all.find(i => i.id === selected.id); if (fresh) setSelected(fresh); }} />
        </div>

        <div className="detail-section">
          <div className="detail-section-title"><span>📋 Usage History</span></div>
          {txLoading ? <div style={{ color: "#4a6a4a", fontSize: 13, padding: "8px 0" }}>Loading...</div>
          : txHistory.length === 0 ? <div style={{ color: "#4a6a4a", fontSize: 13, padding: "8px 0" }}>No history yet</div>
          : txHistory.map(tx => (
            <div key={tx.id} style={{ padding: "8px 0", borderBottom: "1px solid #1f351f" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5,
                    color: tx.type === "received" ? "#70d470" : tx.type === "deducted" ? "#e87070" : "#d4aa40" }}>
                    {tx.type === "received" ? "▲ Received" : tx.type === "deducted" ? "▼ Used" : "✏️ Adjusted"}
                  </span>
                  {tx.note && <div style={{ fontSize: 12, color: "#7aaa50", marginTop: 2 }}>{tx.note}</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 17, fontWeight: 700,
                    color: tx.type === "received" ? "#70d470" : tx.type === "deducted" ? "#e87070" : "#d4aa40" }}>
                    {tx.type === "deducted" ? "−" : "+"}{fmtInvQty(parseFloat(tx.quantity), tx.unit || selected.unit)}
                  </div>
                  <div style={{ fontSize: 11, color: "#4a6a4a" }}>{fmtDate(tx.created_at)}</div>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Modals rendered here so they appear while in detail view */}
        {showReceive && <InvReceiveModal item={showReceive} onClose={async () => { setShowReceive(null); const all = await invGetItems(); const fresh = all.find(i => i.id === selected.id); if (fresh) { setSelected(fresh); } const txs = await invGetTx(selected.id); setTxHistory(txs); }} />}
        {showAdjust && <InvAdjustModal item={showAdjust} onClose={async () => { setShowAdjust(null); const all = await invGetItems(); const fresh = all.find(i => i.id === selected.id); if (fresh) setSelected(fresh); const txs = await invGetTx(selected.id); setTxHistory(txs); }} />}
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, textTransform: "uppercase", color: "#c8e6a0", letterSpacing: 1 }}>
          Inventory
        </div>
        <button className="refresh-btn" onClick={refresh}>⟳</button>
      </div>

      {/* Tab bar */}
      <div className="tab-bar" style={{ marginBottom: 16 }}>
        <button className={"tab-btn" + (tab === "stock" ? " active" : "")} onClick={() => setTab("stock")}>🧪 Stock</button>
        <button className={"tab-btn" + (tab === "analytics" ? " active" : "")} onClick={() => setTab("analytics")}>📊 Analytics</button>
      </div>

      {tab === "analytics" && <UsageAnalytics items={items} />}

      {tab === "stock" && (
        <div>
          {error && <div className="error-banner">{error}</div>}

          {items.some(i => lowStock(i)) && (
            <div style={{ background: "#3a2a0a", border: "2px solid #d4aa40", borderRadius: 10, padding: "12px 14px", marginBottom: 16, color: "#d4aa40", fontSize: 13 }}>
              ⚠️ {items.filter(i => lowStock(i)).length} chemical{items.filter(i => lowStock(i)).length !== 1 ? "s" : ""} below reorder threshold
            </div>
          )}

          <button className="btn btn-primary" style={{ marginBottom: 8 }} onClick={() => setShowShipment(true)}>📦 Receive Shipment</button>
          <button className="btn btn-secondary" style={{ marginBottom: 16 }} onClick={() => setShowAdd(true)}>+ Add Chemical to Inventory</button>

          {loading ? (
            <div className="loading"><div className="spinner"></div><br />Loading...</div>
          ) : items.length === 0 ? (
            <div className="empty-state"><div className="empty-state-icon">🧪</div><div className="empty-state-text">No chemicals in inventory yet</div></div>
          ) : items.map(item => (
        <div className="record-card" key={item.id} onClick={() => openItem(item)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase" }}>{item.name}</div>
              {lowStock(item) && <div style={{ color: "#d4aa40", fontSize: 11, marginTop: 2 }}>⚠️ Low Stock</div>}
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 800, color: lowStock(item) ? "#d4aa40" : "#4a8c2a", lineHeight: 1 }}>
                {fmtInvQty(parseFloat(item.quantity), item.unit)}
              </div>
              <div style={{ fontSize: 11, color: "#4a6a4a" }}>in stock</div>
            </div>
          </div>
        </div>
      ))}
        </div>
      )}

      {/* Modals */}
      {showShipment && <InvShipmentModal items={items} onClose={() => { setShowShipment(false); refresh(); }} />}
      {showAdd && <InvAddModal onClose={() => { setShowAdd(false); refresh(); }} items={items} />}
      {showReceive && <InvReceiveModal item={showReceive} onClose={() => { setShowReceive(null); refresh(); openItem(showReceive); }} />}
      {showAdjust && <InvAdjustModal item={showAdjust} onClose={() => { setShowAdjust(null); refresh(); }} />}
    </div>
  );
}

function InvShipmentModal({ items, onClose }) {
  const INV_UNITS = ["gal","qt","pt","oz","fl oz","lb"];
  const [received, setReceived] = useState([]); // confirmed line items
  const [chemName, setChemName] = useState("");
  const [qty, setQty] = useState("");
  const [unit, setUnit] = useState("gal");
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);
  const [showAddChem, setShowAddChem] = useState(false);
  const [, refreshChems] = useChemicals();

  const existingItem = chemName ? items.find(i => i.name.toLowerCase() === chemName.toLowerCase()) : null;

  const addLine = () => {
    if (!chemName) { setError("Please select a chemical."); return; }
    if (!qty || parseFloat(qty) <= 0) { setError("Please enter a valid quantity."); return; }
    setError("");
    setReceived(r => [...r, { chemName, qty, unit, existingItem }]);
    // Reset for next chemical
    setChemName("");
    setQty("");
    setUnit("gal");
  };

  const removeLine = (i) => setReceived(r => r.filter((_, idx) => idx !== i));

  const saveAll = async () => {
    if (received.length === 0) { setError("Add at least one chemical first."); return; }
    setSaving(true);
    try {
      for (const line of received) {
        const addBase = toBaseUnit(line.qty, line.unit);
        if (line.existingItem) {
          const newQty = parseFloat(line.existingItem.quantity) + addBase;
          await invUpsertItem({ id: line.existingItem.id, quantity: newQty, updated_at: Date.now() });
          await invAddTx({ id: "TX-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,4).toUpperCase(), item_id: line.existingItem.id, job_id: null, type: "received", quantity: addBase, unit: line.existingItem.unit, note: "Shipment received", created_at: Date.now() });
        } else {
          const id = "INV-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,4).toUpperCase();
          await invUpsertItem({ id, name: line.chemName, quantity: addBase, unit: isDryUnit(line.unit) ? "lb" : "gal", created_at: Date.now(), updated_at: Date.now() });
          await invAddTx({ id: "TX-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,4).toUpperCase(), item_id: id, job_id: null, type: "received", quantity: addBase, unit: isDryUnit(line.unit) ? "lb" : "gal", note: "Initial stock — shipment received", created_at: Date.now() });
        }
      }
      onClose();
    } catch(e) { setError("Failed to save. Try again."); }
    setSaving(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div style={{ background: "#1a2e1a", border: "2px solid #4a8c2a", borderRadius: "16px 16px 0 0", padding: 24, width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto" }}>

        {/* Header */}
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase", marginBottom: 4 }}>📦 Receive Shipment</div>
        <div style={{ fontSize: 13, color: "#7aaa50", marginBottom: 16 }}>Add each chemical received, then tap Save All.</div>

        {error && <div className="error-banner">{error}</div>}

        {/* Received so far */}
        {received.length > 0 && (
          <div style={{ background: "#0f1a0f", border: "1px solid #2d4a2d", borderRadius: 10, padding: 12, marginBottom: 16 }}>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#7aaa50", marginBottom: 8 }}>
              ✓ Added to Shipment ({received.length})
            </div>
            {received.map((line, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #1f351f" }}>
                <span style={{ fontSize: 14, color: "#c8e6a0", flex: 1 }}>{line.chemName}</span>
                <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, color: "#4a8c2a", marginRight: 10 }}>
                  {line.qty} {line.unit}
                </span>
                <button onClick={() => removeLine(i)} style={{ background: "#3a1a1a", border: "1px solid #6a2a2a", color: "#e87070", width: 22, height: 22, borderRadius: 5, cursor: "pointer", fontSize: 12, flexShrink: 0 }}>✕</button>
              </div>
            ))}
          </div>
        )}

        {/* Add another line */}
        <div style={{ background: "#0f2a0f", border: "2px solid #2d6a2d", borderRadius: 10, padding: 14, marginBottom: 16 }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#7aaa50", marginBottom: 10 }}>
            {received.length === 0 ? "First Chemical" : "+ Add Another Chemical"}
          </div>
          <div className="section-label" style={{ marginTop: 0 }}>Chemical</div>
          <ChemSelect
            value={chemName}
            onChange={e => { setChemName(e.target.value); setError(""); }}
            onRequestAdd={() => setShowAddChem(true)}
            style={{ marginBottom: 10 }}
          />
          {existingItem && (
            <div style={{ fontSize: 12, color: "#7aaa50", marginBottom: 8 }}>
              Currently: <strong style={{ color: "#c8e6a0" }}>{fmtInvQty(parseFloat(existingItem.quantity), existingItem.unit)}</strong> on hand
            </div>
          )}
          <div className="section-label">Quantity Received</div>
          <div className="input-row" style={{ marginBottom: 12 }}>
            <input placeholder="Amount" type="number" value={qty} onChange={e => setQty(e.target.value)} onKeyDown={e => e.key === "Enter" && addLine()} />
            <select value={unit} onChange={e => setUnit(e.target.value)}>
              {INV_UNITS.map(u => <option key={u}>{u}</option>)}
            </select>
          </div>
          <button
            onClick={addLine}
            style={{ width: "100%", padding: "11px", borderRadius: 8, border: "2px solid #4a8c2a", background: "transparent", color: "#4a8c2a", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, cursor: "pointer" }}
          >
            + Add Another Chemical
          </button>
        </div>

        {/* Save / Cancel */}
        <div style={{ display: "flex", gap: 8 }}>
          <button
            className="btn btn-primary"
            style={{ marginTop: 0 }}
            onClick={saveAll}
            disabled={saving || received.length === 0}
          >
            {saving ? "Saving..." : `Save Shipment (${received.length} item${received.length !== 1 ? "s" : ""})`}
          </button>
          <button className="btn btn-secondary" style={{ marginTop: 0 }} onClick={onClose}>Cancel</button>
        </div>
      </div>
      {showAddChem && <AddChemicalModal onClose={() => setShowAddChem(false)} onAdded={c => { refreshChems(); setChemName(c.name); }} />}
    </div>
  );
}

function InvAddModal({ onClose, items }) {
  const [chemName, setChemName] = useState("");
  const [qty, setQty] = useState("");
  const [unit, setUnit] = useState("gal");
  const [threshold, setThreshold] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [showAddChem, setShowAddChem] = useState(false);
  const [receiveItem, setReceiveItem] = useState(null); // if switching to receive flow
  const [, refreshChems] = useChemicals();
  const INV_UNITS = ["gal","qt","pt","oz","fl oz","lb"];

  // Check if selected chemical is already in inventory
  const existingItem = chemName ? items.find(i => i.name.toLowerCase() === chemName.toLowerCase()) : null;

  const save = async () => {
    if (!chemName || !qty) { setError("Please select a chemical and enter quantity."); return; }

    // If already in inventory, do a receive instead of a new entry
    if (existingItem) {
      setSaving(true);
      try {
        const addBase = toBaseUnit(qty, unit);
        const newQty = parseFloat(existingItem.quantity) + addBase;
        const baseThreshold = threshold ? toBaseUnit(threshold, unit) : existingItem.reorder_threshold;
        await invUpsertItem({ id: existingItem.id, quantity: newQty, reorder_threshold: baseThreshold, updated_at: Date.now() });
        await invAddTx({ id: "TX-" + Date.now().toString(36).toUpperCase(), item_id: existingItem.id, job_id: null, type: "received", quantity: addBase, unit: existingItem.unit, note: "Shipment received", created_at: Date.now() });
        onClose();
      } catch(e) { setError("Failed to save."); }
      setSaving(false);
      return;
    }

    setSaving(true);
    try {
      const baseQty = toBaseUnit(qty, unit);
      const baseThreshold = threshold ? toBaseUnit(threshold, unit) : null;
      const id = "INV-" + Date.now().toString(36).toUpperCase();
      await invUpsertItem({ id, name: chemName, quantity: baseQty, unit: isDryUnit(unit) ? "lb" : "gal", reorder_threshold: baseThreshold, reorder_unit: isDryUnit(unit) ? "lb" : "gal", created_at: Date.now(), updated_at: Date.now() });
      await invAddTx({ id: "TX-" + Date.now().toString(36).toUpperCase(), item_id: id, job_id: null, type: "received", quantity: baseQty, unit: isDryUnit(unit) ? "lb" : "gal", note: "Initial stock entry", created_at: Date.now() });
      onClose();
    } catch(e) { setError("Failed to save."); }
    setSaving(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div style={{ background: "#1a2e1a", border: "2px solid #4a8c2a", borderRadius: "16px 16px 0 0", padding: 24, width: "100%", maxWidth: 480 }}>
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase", marginBottom: 4 }}>
          {existingItem ? "Receive Shipment" : "Add to Inventory"}
        </div>
        <div style={{ fontSize: 13, color: "#7aaa50", marginBottom: 16 }}>
          {existingItem
            ? <span>Currently <strong style={{ color: "#c8e6a0" }}>{fmtInvQty(parseFloat(existingItem.quantity), existingItem.unit)}</strong> on hand — enter amount received to add to stock.</span>
            : "Select a chemical and enter current stock on hand."}
        </div>
        {error && <div className="error-banner">{error}</div>}
        <div className="section-label" style={{ marginTop: 0 }}>Chemical</div>
        <ChemSelect
          value={chemName}
          onChange={e => { setChemName(e.target.value); setError(""); }}
          onRequestAdd={() => setShowAddChem(true)}
          style={{ marginBottom: 10 }}
        />
        <div className="section-label">{existingItem ? "Quantity Received" : "Current Quantity on Hand"}</div>
        <div className="input-row" style={{ marginBottom: 10 }}>
          <input placeholder="Amount" type="number" value={qty} onChange={e => setQty(e.target.value)} />
          <select value={unit} onChange={e => setUnit(e.target.value)}>
            {INV_UNITS.map(u => <option key={u}>{u}</option>)}
          </select>
        </div>
        <div className="section-label">{existingItem ? "Update Low Stock Alert (optional)" : "Low Stock Alert — Notify when below"}</div>
        <div className="input-row" style={{ marginBottom: 16 }}>
          <input placeholder={existingItem && existingItem.reorder_threshold ? fmtInvQty(parseFloat(existingItem.reorder_threshold), existingItem.unit) : "Amount (optional)"} type="number" value={threshold} onChange={e => setThreshold(e.target.value)} />
          <div style={{ display: "flex", alignItems: "center", padding: "0 12px", background: "#0f1a0f", border: "2px solid #2d4a2d", borderRadius: 8, color: "#7aaa50", fontSize: 14 }}>{unit}</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={save} disabled={saving}>
            {saving ? "Saving..." : existingItem ? "Add to Stock" : "Add to Inventory"}
          </button>
          <button className="btn btn-secondary" style={{ marginTop: 0 }} onClick={onClose}>Cancel</button>
        </div>
      </div>
      {showAddChem && <AddChemicalModal onClose={() => setShowAddChem(false)} onAdded={c => { refreshChems(); setChemName(c.name); }} />}
    </div>
  );
}

        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase", marginBottom: 4 }}>Receive Shipment</div>
        <div style={{ color: "#7aaa50", fontSize: 13, marginBottom: 16 }}>{item.name} · Currently {fmtInvQty(parseFloat(item.quantity), item.unit)}</div>
        {error && <div className="error-banner">{error}</div>}
        <div className="section-label" style={{ marginTop: 0 }}>Quantity Received</div>
        <div className="input-row" style={{ marginBottom: 10 }}>
          <input placeholder="Amount" type="number" value={qty} onChange={e => setQty(e.target.value)} />
          <select value={unit} onChange={e => setUnit(e.target.value)}>
            {UNITS.map(u => <option key={u}>{u}</option>)}
          </select>
        </div>
        <div className="section-label">Update Low Stock Alert — Notify when below</div>

          <div style={{ display: "flex", alignItems: "center", padding: "0 12px", background: "#0f1a0f", border: "2px solid #2d4a2d", borderRadius: 8, color: "#7aaa50", fontSize: 14 }}>{unit}</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={save} disabled={saving}>{saving ? "Saving..." : "Receive"}</button>
          <button className="btn btn-secondary" style={{ marginTop: 0 }} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function InvAdjustModal({ item, onClose }) {
  const [qty, setQty] = useState(fmtInvQty(parseFloat(item.quantity), item.unit).split(" ")[0]);
  const [note, setNote] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const save = async () => {
    if (!qty) { setError("Enter adjusted quantity."); return; }
    setSaving(true);
    try {
      const newBase = toBaseUnit(qty, item.unit);
      const diff = newBase - parseFloat(item.quantity);
      await invUpsertItem({ id: item.id, quantity: newBase, updated_at: Date.now() });
      await invAddTx({ id: "TX-" + Date.now().toString(36).toUpperCase(), item_id: item.id, job_id: null, type: "adjusted", quantity: Math.abs(diff), unit: item.unit, note: note || "Manual adjustment", created_at: Date.now() });
      onClose();
    } catch(e) { setError("Failed to save."); }
    setSaving(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div style={{ background: "#1a2e1a", border: "2px solid #4a8c2a", borderRadius: "16px 16px 0 0", padding: 24, width: "100%", maxWidth: 480 }}>
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase", marginBottom: 4 }}>Adjust Inventory</div>
        <div style={{ color: "#7aaa50", fontSize: 13, marginBottom: 16 }}>{item.name} · Currently {fmtInvQty(parseFloat(item.quantity), item.unit)}</div>
        {error && <div className="error-banner">{error}</div>}
        <div className="section-label" style={{ marginTop: 0 }}>Set Correct Quantity ({item.unit})</div>
        <input placeholder="Corrected amount" type="number" value={qty} onChange={e => setQty(e.target.value)} style={{ marginBottom: 10 }} />
        <div className="section-label">Reason (optional)</div>
        <input placeholder="e.g. Physical count, spill, waste" value={note} onChange={e => setNote(e.target.value)} style={{ marginBottom: 16 }} />
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={save} disabled={saving}>{saving ? "Saving..." : "Save Adjustment"}</button>
          <button className="btn btn-secondary" style={{ marginTop: 0 }} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ---- USAGE ANALYTICS ----
function UsageAnalytics({ items }) {
  const [allTx, setAllTx] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedItem, setSelectedItem] = useState(null);
  const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

  useEffect(() => {
    invGetAllTx().then(txs => { setAllTx(txs); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  useEffect(() => {
    if (items.length > 0 && !selectedItem) setSelectedItem(items[0]);
  }, [items]);

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Get all years that have deduction data
  const deductions = allTx.filter(tx => tx.type === "deducted");
  const years = [...new Set(deductions.map(tx => new Date(tx.created_at).getFullYear()))].sort((a,b) => b-a);
  if (!years.includes(selectedYear) && years.length > 0) { /* selectedYear will be set by selector */ }
  const availableYears = years.length > 0 ? years : [new Date().getFullYear()];

  // Monthly usage for selected chemical and year
  const monthlyUsage = (item, year) => {
    if (!item) return Array(12).fill(0);
    return MONTHS.map((_, month) => {
      const total = deductions
        .filter(tx => tx.item_id === item.id && new Date(tx.created_at).getFullYear() === year && new Date(tx.created_at).getMonth() === month)
        .reduce((sum, tx) => sum + parseFloat(tx.quantity), 0);
      return parseFloat(total.toFixed(3));
    });
  };

  // Year totals for comparison header
  const yearTotal = (item, year) => monthlyUsage(item, year).reduce((a,b) => a+b, 0);

  const currentData = monthlyUsage(selectedItem, selectedYear);
  const prevData = monthlyUsage(selectedItem, selectedYear - 1);
  const maxVal = Math.max(...currentData, ...prevData, 0.001);

  const unit = selectedItem ? selectedItem.unit : "gal";

  if (loading) return <div className="loading"><div className="spinner"></div><br/>Loading...</div>;

  return (
    <div>
      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 800, color: "#c8e6a0", textTransform: "uppercase", letterSpacing: 1, marginBottom: 16 }}>
        Usage Analytics
      </div>

      {items.length === 0 ? (
        <div className="empty-state"><div className="empty-state-icon">📊</div><div className="empty-state-text">No inventory data yet</div></div>
      ) : (
        <div>
          {/* Chemical selector */}
          <div className="section-label" style={{ marginTop: 0 }}>Chemical</div>
          <select value={selectedItem ? selectedItem.id : ""} onChange={e => setSelectedItem(items.find(i => i.id === e.target.value))} style={{ marginBottom: 16 }}>
            {items.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}
          </select>

          {/* Year selector */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            {availableYears.map(yr => (
              <button key={yr} className={"filter-chip" + (selectedYear === yr ? " active" : "")} onClick={() => setSelectedYear(yr)}>{yr}</button>
            ))}
            {!availableYears.includes(new Date().getFullYear()) && (
              <button className={"filter-chip" + (selectedYear === new Date().getFullYear() ? " active" : "")} onClick={() => setSelectedYear(new Date().getFullYear())}>{new Date().getFullYear()}</button>
            )}
          </div>

          {/* Summary cards */}
          {selectedItem && (
            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
              <div style={{ flex: 1, background: "#1a2e1a", border: "1px solid #2d4a2d", borderRadius: 8, padding: "12px", textAlign: "center" }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, color: "#4a8c2a", lineHeight: 1 }}>
                  {fmtInvQty(parseFloat(selectedItem.quantity), unit)}
                </div>
                <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", marginTop: 4 }}>On Hand</div>
              </div>
              <div style={{ flex: 1, background: "#1a2e1a", border: "1px solid #2d4a2d", borderRadius: 8, padding: "12px", textAlign: "center" }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, color: "#c8e6a0", lineHeight: 1 }}>
                  {fmtInvQty(yearTotal(selectedItem, selectedYear), unit)}
                </div>
                <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", marginTop: 4 }}>{selectedYear} Used</div>
              </div>
              <div style={{ flex: 1, background: "#1a2e1a", border: "1px solid #2d4a2d", borderRadius: 8, padding: "12px", textAlign: "center" }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, color: "#7aaa50", lineHeight: 1 }}>
                  {fmtInvQty(yearTotal(selectedItem, selectedYear - 1), unit)}
                </div>
                <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", marginTop: 4 }}>{selectedYear - 1} Used</div>
              </div>
            </div>
          )}

          {/* Bar chart */}
          {selectedItem && (
            <div style={{ background: "#1a2e1a", border: "2px solid #2d4a2d", borderRadius: 12, padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#7aaa50" }}>
                  Monthly Usage
                </div>
                <div style={{ display: "flex", gap: 12, fontSize: 11 }}>
                  <span style={{ color: "#4a8c2a" }}>■ {selectedYear}</span>
                  <span style={{ color: "#2d4a2d", filter: "brightness(2)" }}>■ {selectedYear - 1}</span>
                </div>
              </div>

              {/* Y-axis labels + bars */}
              <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 160, paddingBottom: 24, position: "relative" }}>
                {/* Y-axis */}
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 24, width: 40, display: "flex", flexDirection: "column", justifyContent: "space-between", pointerEvents: "none" }}>
                  {[1, 0.75, 0.5, 0.25, 0].map(pct => (
                    <div key={pct} style={{ fontSize: 9, color: "#4a6a4a", textAlign: "right", paddingRight: 4 }}>
                      {pct === 0 ? "0" : fmtInvQty(maxVal * pct, unit).replace(" gal","g").replace(" pt","pt").replace(" oz","oz").replace(" lb","lb")}
                    </div>
                  ))}
                </div>

                {/* Gridlines */}
                <div style={{ position: "absolute", left: 40, right: 0, top: 0, bottom: 24, pointerEvents: "none" }}>
                  {[0, 0.25, 0.5, 0.75, 1].map(pct => (
                    <div key={pct} style={{ position: "absolute", left: 0, right: 0, top: (1-pct) * 136, borderTop: "1px solid #1f2f1f", height: 1 }} />
                  ))}
                </div>

                {/* Month columns */}
                <div style={{ flex: 1, marginLeft: 44, display: "flex", alignItems: "flex-end", gap: 3, height: "100%" }}>
                  {MONTHS.map((month, i) => (
                    <div key={month} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 1, height: "100%", justifyContent: "flex-end" }}>
                      {/* Bars */}
                      <div style={{ width: "100%", display: "flex", gap: 1, alignItems: "flex-end", height: 136 }}>
                        {/* Previous year bar */}
                        <div style={{
                          flex: 1,
                          height: prevData[i] > 0 ? Math.max(2, (prevData[i] / maxVal) * 136) : 0,
                          background: "#2d4a2d",
                          borderRadius: "2px 2px 0 0",
                          transition: "height 0.3s"
                        }} title={prevData[i] > 0 ? fmtInvQty(prevData[i], unit) + " in " + month + " " + (selectedYear-1) : ""} />
                        {/* Current year bar */}
                        <div style={{
                          flex: 1,
                          height: currentData[i] > 0 ? Math.max(2, (currentData[i] / maxVal) * 136) : 0,
                          background: currentData[i] > 0 ? "#4a8c2a" : "transparent",
                          borderRadius: "2px 2px 0 0",
                          transition: "height 0.3s"
                        }} title={currentData[i] > 0 ? fmtInvQty(currentData[i], unit) + " in " + month + " " + selectedYear : ""} />
                      </div>
                      {/* Month label */}
                      <div style={{ fontSize: 9, color: "#4a6a4a", marginTop: 4, textAlign: "center" }}>{month}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Monthly detail — current year only, non-zero months */}
              {currentData.some(v => v > 0) && (
                <div style={{ marginTop: 12, borderTop: "1px solid #2d4a2d", paddingTop: 12 }}>
                  <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700 }}>
                    {selectedYear} Monthly Breakdown
                  </div>
                  {MONTHS.map((month, i) => currentData[i] > 0 ? (
                    <div key={month} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid #1f2f1f", fontSize: 13 }}>
                      <span style={{ color: "#8aaa70" }}>{month}</span>
                      <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, color: "#c8e6a0" }}>{fmtInvQty(currentData[i], unit)}</span>
                    </div>
                  ) : null)}
                </div>
              )}
              {!currentData.some(v => v > 0) && (
                <div style={{ textAlign: "center", color: "#4a6a4a", fontSize: 13, paddingTop: 8 }}>No usage recorded for {selectedYear}</div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [role, setRole] = useState("select");
  const roles = [
    { id: "driver", emoji: "🚛", name: "Truck Driver", desc: "Record mix, add tank fills & acres" },
    { id: "applicator", emoji: "🌾", name: "Applicator", desc: "View mix info, log acres & complete" },
    { id: "billing", emoji: "💼", name: "Billing", desc: "Review completed jobs & mark billed" },
    { id: "inventory", emoji: "🧪", name: "Inventory", desc: "Manage chemical stock levels" },
  ];
  const rl = roles.find(r => r.id === role);
  return (
    <div>
      <div className="header">
        <div className="header-icon">🌿</div>
        <div>
          <div className="header-title">AgSpray Log</div>
          <div className="header-sub">{role === "select" ? "Select Role" : rl?.name}</div>
        </div>
        {role !== "select" && (
          <>
            <div className="sync-dot" />
            <button className="switch-btn" onClick={() => setRole("select")}>Switch</button>
          </>
        )}
      </div>
      {role === "select" && (
        <div className="content">
          <div className="role-screen">
            <div className="role-headline">Who are you?</div>
            <div className="role-sub">Select your role to continue</div>
            <div className="role-grid">
              {roles.map(r => (
                <div className="role-card" key={r.id} onClick={() => setRole(r.id)}>
                  <div className="role-emoji">{r.emoji}</div>
                  <div><div className="role-name">{r.name}</div><div className="role-desc">{r.desc}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {role === "driver" && <DriverView />}
      {role === "applicator" && <div className="content"><RecordList mode="applicator" key="app" /></div>}
      {role === "billing" && <div className="content"><RecordList mode="billing" key="bill" /></div>}
      {role === "inventory" && <div className="content"><InventoryView /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
