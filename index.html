<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://dbnjujpfihwlcuxwhgoh.supabase.co";
const SUPABASE_KEY = "sb_publishable_o4g2i-LpquzZ0Rgpr7AHzA_9dDPuctd";
const hdrs = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Prefer": "return=representation" };

async function dbGetAll() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/spray_records?order=created_at.desc", { headers: hdrs });
  if (!res.ok) throw new Error("fetch failed");
  return res.json();
}
async function dbInsert(rec) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/spray_records", { method: "POST", headers: hdrs, body: JSON.stringify(rec) });
  if (!res.ok) throw new Error("insert failed");
  return res.json();
}
async function dbUpdate(id, patch) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/spray_records?id=eq." + id, { method: "PATCH", headers: hdrs, body: JSON.stringify(patch) });
  if (!res.ok) throw new Error("update failed");
  return res.json();
}
async function dbDelete(id) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/spray_records?id=eq." + id, { method: "DELETE", headers: hdrs });
  if (!res.ok) throw new Error("delete failed");
}

// ---- INVENTORY DB ----
async function invGetItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/inventory_items?order=name.asc", { headers: hdrs });
  if (!res.ok) throw new Error("fetch failed");
  return res.json();
}
async function invGetAllTx() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/inventory_transactions?order=created_at.asc", { headers: hdrs });
  if (!res.ok) throw new Error("fetch failed");
  return res.json();
}
async function invGetTx(itemId) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/inventory_transactions?item_id=eq." + itemId + "&order=created_at.desc&limit=50", { headers: hdrs });
  if (!res.ok) throw new Error("fetch failed");
  return res.json();
}
async function invUpsertItem(item) {
  const method = item.id ? "PATCH" : "POST";
  const url = item.id
    ? SUPABASE_URL + "/rest/v1/inventory_items?id=eq." + item.id
    : SUPABASE_URL + "/rest/v1/inventory_items";
  const res = await fetch(url, { method, headers: hdrs, body: JSON.stringify(item) });
  if (!res.ok) throw new Error("upsert failed");
  return res.json();
}
async function invAddTx(tx) {
  // Write both 'type' and 'transaction_type' for DB compatibility
  const payload = { ...tx, transaction_type: tx.type };
  const res = await fetch(SUPABASE_URL + "/rest/v1/inventory_transactions", { method: "POST", headers: hdrs, body: JSON.stringify(payload) });
  if (!res.ok) throw new Error("tx failed");
  return res.json();
}

// ---- UNIT CONVERSION ----
// All inventory is stored in base units: gallons (liquid) or pounds (dry)
// Returns value in base unit given a display value + display unit
function toBaseUnit(val, unit) {
  const v = parseFloat(val);
  if (isNaN(v)) return 0;
  switch (unit) {
    case "gal":     return v;
    case "qt":      return v / 4;
    case "pt":      return v / 8;
    case "oz":
    case "fl oz":   return v / 128;
    case "lb":      return v;
    default:        return v;
  }
}
// Formats a base-unit quantity for display
function fmtInvQty(baseQty, unit) {
  if (unit === "lb") return parseFloat(baseQty.toFixed(2)) + " lb";
  // gallons — pick best display unit
  const gal = baseQty;
  if (gal >= 1)  return parseFloat(gal.toFixed(2)) + " gal";
  if (gal >= 0.125) return parseFloat((gal * 8).toFixed(2)) + " pt";
  return parseFloat((gal * 128).toFixed(1)) + " oz";
}
// Determine if a chemical unit is dry (lb-based) or liquid
function isDryUnit(unit) {
  return unit && (unit.includes("lb") || unit === "lb/ac" || unit === "lb/100 gal");
}
// Convert a fill-plan amount (val + unit) to base inventory units (gal or lb)
function fillAmtToBase(val, unit) {
  const v = parseFloat(val);
  if (isNaN(v)) return 0;
  if (unit === "gal" || unit === "lb") return v;
  if (unit === "qt")  return v / 4;
  if (unit === "pt")  return v / 8;
  if (unit === "oz" || unit === "fl oz") return v / 128;
  return v;
}

function genId() { return "REC-" + Date.now().toString(36).toUpperCase(); }
function fmtDate(ts) { if (!ts) return "—"; return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
function fmtDT(ts) { if (!ts) return "—"; return new Date(ts).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }); }

const CARRIERS = ["Water","Liquid Fertilizer (UAN 28%)","AMS Solution","Crop Oil Concentrate"];
const TANKS = ["100 gal","200 gal","300 gal","400 gal","500 gal","600 gal","750 gal","1000 gal","1200 gal","1500 gal","2000 gal","3000 gal"];
const UNITS = ["oz/ac","pt/ac","qt/ac","gal/ac","lb/ac","fl oz/ac","oz/100 gal","pt/100 gal","qt/100 gal","gal/100 gal","lb/100 gal","fl oz/100 gal"];
const CHEM_CATEGORIES = ["Corn Herbicide","Soybean Herbicide","Wheat Herbicide","Fungicide","Insecticide","Adjuvant","Other"];

// Global chemicals cache — loaded once, shared across components
let _chemCache = null;
let _chemCacheListeners = [];
async function loadChemicals() {
  if (_chemCache) return _chemCache;
  const res = await fetch(SUPABASE_URL + "/rest/v1/chemicals?order=category.asc,name.asc", { headers: hdrs });
  if (!res.ok) throw new Error("fetch failed");
  _chemCache = await res.json();
  return _chemCache;
}
async function addChemical(chem) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/chemicals", { method: "POST", headers: hdrs, body: JSON.stringify(chem) });
  if (!res.ok) throw new Error("insert failed");
  _chemCache = null; // invalidate cache
  return (await res.json())[0];
}
function useChemicals() {
  const [chems, setChems] = useState(_chemCache || []);
  useEffect(() => {
    if (!_chemCache) { loadChemicals().then(setChems).catch(() => {}); }
  }, []);
  return [chems, () => { _chemCache = null; loadChemicals().then(setChems).catch(() => {}); }];
}

// Add New Chemical modal — used by both driver and inventory manager
function AddChemicalModal({ onClose, onAdded }) {
  const [name, setName] = useState("");
  const [category, setCategory] = useState("Other");
  const [defaultUnit, setDefaultUnit] = useState("oz/ac");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  const save = async () => {
    if (!name.trim()) { setError("Chemical name is required."); return; }
    setSaving(true);
    try {
      const id = "chem-" + Date.now().toString(36).toUpperCase();
      const chem = await addChemical({ id, name: name.trim(), category, default_unit: defaultUnit, is_dry: defaultUnit.includes("lb"), created_at: Date.now() });
      onAdded && onAdded({ id, name: name.trim(), category, default_unit: defaultUnit });
      onClose();
    } catch(e) { setError("Failed to save. Name may already exist."); }
    setSaving(false);
  };

  return (

function calcTotal(rate, unit, acres, totalGals) {
  const r = parseFloat(rate);
  const a = parseFloat(acres);
  const g = parseFloat(totalGals);
  if (!r || r <= 0) return null;

  const per100gal = unit && unit.includes("/100 gal");

  if (per100gal) {
    // rate is per 100 gallons of spray carrier
    if (!g || g <= 0) return null;
    const totalAmt = (r / 100) * g;
    const displayUnit = unit.replace("/100 gal", "");
    // convert to sensible display unit
    if (displayUnit === "oz" || displayUnit === "fl oz") {
      if (totalAmt >= 128) return { val: (totalAmt / 128).toFixed(2), unit: "gal total" };
      return { val: totalAmt.toFixed(2), unit: displayUnit + " total" };
    }
    if (displayUnit === "pt") {
      if (totalAmt >= 8) return { val: (totalAmt / 8).toFixed(2), unit: "gal total" };
      return { val: totalAmt.toFixed(2), unit: "pt total" };
    }
    if (displayUnit === "qt") {
      if (totalAmt >= 4) return { val: (totalAmt / 4).toFixed(2), unit: "gal total" };
      return { val: totalAmt.toFixed(2), unit: "qt total" };
    }
    if (displayUnit === "lb") return { val: totalAmt.toFixed(2), unit: "lb total" };
    if (displayUnit === "gal") return { val: totalAmt.toFixed(2), unit: "gal total" };
    return { val: totalAmt.toFixed(2), unit: displayUnit + " total" };
  } else {
    // rate is per acre
    if (!a || a <= 0) return null;
    const totalAmt = r * a;
    if (unit === "oz/ac" || unit === "fl oz/ac") {
      if (totalAmt >= 128) return { val: (totalAmt / 128).toFixed(2), unit: "gal total" };
      if (totalAmt >= 16) return { val: (totalAmt / 16).toFixed(2), unit: "pt total" };
      return { val: totalAmt.toFixed(1), unit: "oz total" };
    }
    if (unit === "pt/ac") {
      if (totalAmt >= 8) return { val: (totalAmt / 8).toFixed(2), unit: "gal total" };
      return { val: totalAmt.toFixed(2), unit: "pt total" };
    }
    if (unit === "qt/ac") {
      if (totalAmt >= 4) return { val: (totalAmt / 4).toFixed(2), unit: "gal total" };
      return { val: totalAmt.toFixed(2), unit: "qt total" };
    }
    if (unit === "gal/ac") return { val: totalAmt.toFixed(2), unit: "gal total" };
    if (unit === "lb/ac") return { val: totalAmt.toFixed(2), unit: "lb total" };
    return { val: totalAmt.toFixed(2), unit: unit.replace("/ac","") + " total" };
  }
}

function MixEditor({ items, setItems }) {
  const [showAddChem, setShowAddChem] = useState(false);
  const [pendingAddIdx, setPendingAddIdx] = useState(null);
  const [, refreshChems] = useChemicals();

  const add = () => setItems(m => [...m, { chemical: "", rate: "", unit: "oz/ac" }]);
  const remove = i => setItems(m => m.filter((_, idx) => idx !== i));
  const set = (i, k, v) => setItems(m => m.map((item, idx) => idx === i ? { ...item, [k]: v } : item));

  const handleRequestAdd = (i) => { setPendingAddIdx(i); setShowAddChem(true); };
  const handleChemAdded = (chem) => {
    refreshChems();
    if (pendingAddIdx !== null) {
      set(pendingAddIdx, "chemical", chem.name);

  return (
    <div>

        <div className="mix-item" key={i}>

          {items.length > 1 && <button className="remove-btn" onClick={() => remove(i)}>✕</button>}

  const fullFills = totalGals ? Math.floor(totalGals / capacity) : null;
  const partialGals = totalGals ? totalGals - fullFills * capacity : null;
  const hasPartial = partialGals > 0.5;

  const mixItems = rec.mix_items || [];

  // Build chemical totals
  const chemRows = mixItems.filter(m => m.chemical && m.rate).map(item => {
    const name = item.chemical === "Custom / Other" ? (item.customName || "Custom") : item.chemical;

      const fmt = calcFmtAmt(raw, isPer100 ? item.unit.replace("/100 gal", "/ac") : item.unit);
      totalStr = fmt.val + " " + fmt.u;

  };

  const handleComplete = async () => {
    if (!applicator) { setError("Please enter applicator name."); return; }
    setSaving(true); setError("");
    try {
      await dbUpdate(rec.id, { applicator, applicator_notes: appNotes, status: "complete", completed_at: Date.now() });

      // Auto-deduct inventory using whole job totals
      const acres    = parseFloat(liveAcres || rec.acres);
      const carrier  = parseFloat(rec.carrier_rate);
      const capacity = parseFloat(rec.tank_size || 1200);
      if (acres && carrier && rec.mix_items) {
        const totalGals = acres * carrier;
        const fullFills = Math.floor(totalGals / capacity);
        const partialGals = totalGals - fullFills * capacity;
        const hasPartial = partialGals > 0.5;
        const items = await invGetItems();

        for (const chem of rec.mix_items.filter(m => m.chemical && m.rate)) {
          const isPer100 = chem.unit.includes("/100 gal");
          let rawAmt;
          if (isPer100) {
            rawAmt = (parseFloat(chem.rate) / 100) * totalGals;
          } else {
            rawAmt = parseFloat(chem.rate) * acres;
          }
          const fmt = calcFmtAmt(rawAmt, isPer100 ? chem.unit.replace("/100 gal", "/ac") : chem.unit);
          const baseAmt = fillAmtToBase(fmt.val, fmt.u);
          const chemName = chem.chemical === "Custom / Other" ? (chem.customName || "Custom") : chem.chemical;

          // Find matching inventory item by name (case-insensitive)
          const invItem = items.find(i => i.name.toLowerCase() === chemName.toLowerCase());
          if (invItem) {
            const newQty = Math.max(0, parseFloat(invItem.quantity) - baseAmt);
            await invUpsertItem({ id: invItem.id, quantity: newQty, updated_at: Date.now() });
            await invAddTx({
              id: "TX-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase(),
              item_id: invItem.id,
              job_id: rec.id,
              type: "deducted",
              quantity: baseAmt,
              unit: invItem.unit,
              note: "Auto-deducted: " + rec.grower + " — " + rec.field_name,
              created_at: Date.now()
            });
          }
        }
      }

      setSaved(true); reload();
    } catch(e) { setError("Failed to save."); }
    setSaving(false);
  };

  const handleBilled = async () => {
    setSaving(true);
    try { await dbUpdate(rec.id, { billed: true, billed_at: Date.now() }); onUpdate && onUpdate(); onBack(); }
    catch(e) { setError("Failed to update."); }
    setSaving(false);
  };

  const handleDelete = async () => {
    setDeleting(true);
    try { await dbDelete(rec.id); onUpdate && onUpdate(); onBack(); }
    catch(e) { setError("Failed to delete. Try again."); setConfirmDelete(false); }
    setDeleting(false);
  };

  // Pending-only: once an applicator marks it complete it's a real job and can't be deleted
  // Driver and applicator only — billing is read-only
  const canDelete = rec.status === "pending" && !rec.billed && (mode === "driver" || mode === "applicator");

  return (
    <div>
      <button className="back-btn" onClick={onBack}>← Back to Records</button>
      {saved && <div className="success-banner">✓ Record Completed & Synced!</div>}
      {error && <div className="error-banner">{error}</div>}

      <div className="detail-section">
        <div className="detail-section-title"><span>📋 Job Info</span></div>
        <div className="detail-row"><span className="detail-key">Grower</span><span className="detail-val">{rec.grower}</span></div>
        <div className="detail-row">
          <span className="detail-key">Fields</span>
          <span className="detail-val" style={{ textAlign: "right" }}>
            {(rec.field_name || "").split(", ").map((f, i) => (
              <div key={i}>{f}</div>
            ))}
          </span>
        </div>
        <div className="detail-row"><span className="detail-key">Date</span><span className="detail-val">{rec.date}</span></div>
        <div className="detail-row"><span className="detail-key">Driver</span><span className="detail-val">{rec.truck_driver}</span></div>
        <div className="detail-row"><span className="detail-key">ID</span><span className="detail-val" style={{ fontSize: 11 }}>{rec.id}</span></div>
        <div className="detail-row"><span className="detail-key">Status</span>
          <span className={"badge " + (rec.billed ? "badge-billed" : rec.status === "complete" ? "badge-complete" : "badge-pending")}>
            {rec.billed ? "Billed" : rec.status}
          </span>
        </div>
      </div>

      {/* Fill Plan — driver can round, applicator and billing are read-only */}
      {rec.carrier_rate && rec.mix_items && rec.mix_items.some(m => m.chemical && m.rate) && (
        <FillPlan
          mixItems={rec.mix_items}
          setMixItems={() => {}}
          estimatedAcres={liveAcres}
          carrierRate={rec.carrier_rate}
          tankCapacity={rec.tank_size || "1200"}
          readOnly={mode !== "driver"}
          grower={rec.grower}
          fieldName={rec.field_name}
        />
      )}

      {rec.notes ? <div className="detail-section"><div className="detail-section-title"><span>📝 Driver Notes</span></div><div style={{ color: "#c8e6a0", fontSize: 14, lineHeight: 1.6 }}>{rec.notes}</div></div> : null}

      {(rec.status === "complete" || saved) ? (
        <div>
          <div className="detail-section">
            <div className="detail-section-title"><span>✅ Completion Info</span></div>
            <AcresEditor rec={rec} role={mode} onUpdate={reload} onAcresChange={setLiveAcres} />
            <div className="detail-row" style={{ marginTop: 12 }}><span className="detail-key">Applicator</span><span className="detail-val">{rec.applicator || applicator}</span></div>
            {(rec.applicator_notes || appNotes) && <div className="detail-row"><span className="detail-key">Notes</span><span className="detail-val">{rec.applicator_notes || appNotes}</span></div>}
            {rec.completed_at && <div className="detail-row"><span className="detail-key">Completed</span><span className="detail-val">{fmtDate(rec.completed_at)}</span></div>}
          </div>
          {mode === "billing" && !rec.billed && <button className="btn btn-primary" onClick={handleBilled} disabled={saving}>{saving ? "Saving..." : "Mark as Billed ✓"}</button>}
          {mode === "billing" && <button className="btn btn-secondary" style={{ marginTop: 8 }} onClick={() => printSummary(rec)}>🖨 Print Summary</button>}
          {rec.billed && <div style={{ textAlign: "center", color: "#7070e8", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, padding: "12px 0" }}>✓ Billed on {fmtDate(rec.billed_at)}</div>}
        </div>
      ) : mode === "applicator" ? (
        <div className="detail-section">
          <div className="detail-section-title"><span>✅ Complete Application</span></div>
          <AcresEditor rec={rec} role={mode} onUpdate={reload} onAcresChange={setLiveAcres} />
          <div style={{ height: 12 }} />
          <input placeholder="Applicator Name *" value={applicator} onChange={e => setApplicator(e.target.value)} style={{ marginBottom: 8 }} />
          <textarea placeholder="Applicator notes (conditions, issues, etc.)" value={appNotes} onChange={e => setAppNotes(e.target.value)} style={{ marginBottom: 10 }} />
          <button className="btn btn-primary" style={{ marginTop: 0 }} onClick={handleComplete} disabled={saving}>{saving ? "Saving..." : "Mark Complete & Sync →"}</button>
        </div>
      ) : mode === "driver" ? (
        <div className="detail-section">
          <div className="detail-section-title"><span>🌱 Acres</span></div>
          <AcresEditor rec={rec} role={mode} onUpdate={reload} onAcresChange={setLiveAcres} />
          <div className="info-banner" style={{ marginTop: 12 }}>Applicator will mark this job complete when finished spraying.</div>
        </div>
      ) : null}

      {canDelete && (
        <div style={{ marginTop: 28, paddingTop: 16, borderTop: "1px solid #2a1a1a" }}>
          {!confirmDelete ? (
            <button
              onClick={() => setConfirmDelete(true)}
              style={{ width: "100%", padding: "12px", borderRadius: "8px", border: "1px solid #5a2a2a", background: "transparent", color: "#7a3a3a", fontFamily: "'Barlow Condensed', sans-serif", fontSize: "15px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "1px", cursor: "pointer" }}
            >
              🗑 Cancel / Delete This Job
            </button>
          ) : (
            <div style={{ background: "#2a0f0f", border: "2px solid #8c2a2a", borderRadius: "10px", padding: "16px" }}>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: "18px", fontWeight: 800, color: "#e87070", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "6px" }}>
                Delete This Job?
              </div>
              <div style={{ fontSize: "13px", color: "#aa6060", marginBottom: "14px", lineHeight: 1.5 }}>
                This will permanently remove the record for <strong style={{ color: "#e8a0a0" }}>{rec.grower} — {rec.field_name}</strong>. This cannot be undone.
              </div>
              <div style={{ display: "flex", gap: "8px" }}>
                <button
                  onClick={handleDelete}
                  disabled={deleting}
                  style={{ flex: 1, padding: "12px", borderRadius: "8px", border: "none", background: "#8c2a2a", color: "#fff", fontFamily: "'Barlow Condensed', sans-serif", fontSize: "16px", fontWeight: 700, textTransform: "uppercase", cursor: "pointer", opacity: deleting ? 0.6 : 1 }}
                >
                  {deleting ? "Deleting..." : "Yes, Delete It"}
                </button>
                <button
                  onClick={() => setConfirmDelete(false)}
                  style={{ flex: 1, padding: "12px", borderRadius: "8px", border: "2px solid #2d4a2d", background: "transparent", color: "#7aaa50", fontFamily: "'Barlow Condensed', sans-serif", fontSize: "16px", fontWeight: 700, textTransform: "uppercase", cursor: "pointer" }}
                >
                  Keep It
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function RecordList({ mode }) {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState(mode === "billing" ? "unbilled" : "all");
  const [search, setSearch] = useState("");
  const [tick, setTick] = useState(0);

  const load = useCallback(async () => {
    try { const data = await dbGetAll(); setRecords(data); setError(""); } catch(e) { setError("Could not load records."); }
    setLoading(false);
  }, []);

  useEffect(() => { setLoading(true); load(); }, [load, tick]);
  useEffect(() => { const t = setInterval(() => setTick(n => n + 1), 3600000); return () => clearInterval(t); }, []);

  const refresh = () => { setLoading(true); setTick(n => n + 1); };

  const filtered = records
    .filter(r => {
      if (mode === "applicator") { if (r.billed) return false; if (filter !== "all") return r.status === filter; return true; }
      if (mode === "driver") { if (filter !== "all") return r.status === filter; return true; }
      if (filter === "unbilled") return !r.billed && r.status === "complete";
      if (filter === "billed") return r.billed;
      return true;
    })
    .filter(r => !search || (r.grower || "").toLowerCase().includes(search.toLowerCase()) || (r.field_name || "").toLowerCase().includes(search.toLowerCase()));

  const totalAcres = filtered.reduce((sum, r) => sum + (parseFloat(r.acres) || 0), 0);

  if (selected) {
    const fresh = records.find(r => r.id === selected.id) || selected;
    return <RecordDetail rec={fresh} onBack={() => { setSelected(null); refresh(); }} mode={mode} onUpdate={refresh} />;
  }

  const filterTabs = mode === "billing"
    ? [["unbilled","🟡 Ready to Bill"],["billed","✅ Billed"],["all","All"]]
    : [["all","All"],["pending","⏳ Pending"],["complete","✅ Complete"]];

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 800, textTransform: "uppercase", color: "#c8e6a0", letterSpacing: 1 }}>
          {mode === "billing" ? "Billing Records" : mode === "driver" ? "My Records" : "Application Records"}
        </div>
        <button className="refresh-btn" onClick={refresh}>⟳ Refresh</button>
      </div>
      {error && <div className="error-banner">{error}</div>}
      <input placeholder="Search field or grower..." value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 12, marginTop: 12 }} />
      <div className="filter-bar">
        {filterTabs.map(([f, label]) => (
          <button key={f} className={"filter-chip" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>{label}</button>
        ))}
      </div>
      {mode === "billing" && filtered.length > 0 && (
        <div className="billing-total">
          <div><div className="billing-total-label">Total Acres</div><div style={{ color: "#7aaa50", fontSize: 12 }}>{filtered.length} record{filtered.length !== 1 ? "s" : ""}</div></div>
          <div className="billing-total-val">{totalAcres.toLocaleString()} ac</div>
        </div>
      )}
      <div style={{ height: 14 }} />
      {loading ? (
        <div className="loading"><div className="spinner"></div><br />Loading...</div>
      ) : filtered.length === 0 ? (
        <div className="empty-state"><div className="empty-state-icon">🌾</div><div className="empty-state-text">No records found</div></div>
      ) : filtered.map(rec => (
        <div className="record-card" key={rec.id} onClick={() => setSelected(rec)}>
          <div className="record-card-header">
            <div>
              <div className="record-id">{rec.id} · {rec.date}</div>
              <div className="record-field-name">{rec.grower}</div>
              <div style={{ color: "#8aaa70", fontSize: 13, marginTop: 2 }}>{rec.field_name}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-end" }}>
              <span className={"badge " + (rec.billed ? "badge-billed" : rec.status === "complete" ? "badge-complete" : "badge-pending")}>{rec.billed ? "Billed" : rec.status}</span>
              {rec.acres && <span style={{ color: "#4a8c2a", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 18 }}>{rec.acres} ac</span>}
              {rec.tank_fills && rec.tank_fills.length > 0 && <span style={{ fontSize: 11, color: "#7aaa50" }}>🛢 {rec.tank_fills.length + 1} fills</span>}
            </div>
          </div>
          <div className="record-meta">
            {(rec.mix_items || []).filter(m => m.chemical).map((m, i) => (
              <span className="meta-chip" key={i}>{m.chemical === "Custom / Other" ? (m.customName || "Custom") : m.chemical}</span>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ---- FILL PLAN CALCULATOR ----
function calcFmtAmt(rawAmt, unit) {
  // Convert raw amount (in base unit/ac or base unit/100gal) to a nice display string
  if (unit === "oz/ac" || unit === "fl oz/ac") {
    if (rawAmt >= 128) return { val: (rawAmt/128).toFixed(2), u: "gal" };
    if (rawAmt >= 16)  return { val: (rawAmt/16).toFixed(2),  u: "pt"  };
    return { val: rawAmt.toFixed(1), u: "oz" };
  }
  if (unit === "pt/ac") {
    if (rawAmt >= 8) return { val: (rawAmt/8).toFixed(2), u: "gal" };
    return { val: rawAmt.toFixed(2), u: "pt" };
  }
  if (unit === "qt/ac") {
    if (rawAmt >= 4) return { val: (rawAmt/4).toFixed(2), u: "gal" };
    return { val: rawAmt.toFixed(2), u: "qt" };
  }
  if (unit === "gal/ac")  return { val: rawAmt.toFixed(2), u: "gal" };
  if (unit === "lb/ac")   return { val: rawAmt.toFixed(2), u: "lb"  };
  // per/100gal units
  if (unit === "oz/100 gal" || unit === "fl oz/100 gal") {
    if (rawAmt >= 128) return { val: (rawAmt/128).toFixed(2), u: "gal" };
    if (rawAmt >= 16)  return { val: (rawAmt/16).toFixed(2),  u: "pt"  };
    return { val: rawAmt.toFixed(1), u: "oz" };
  }
  if (unit === "pt/100 gal") {
    if (rawAmt >= 8) return { val: (rawAmt/8).toFixed(2), u: "gal" };
    return { val: rawAmt.toFixed(2), u: "pt" };
  }
  if (unit === "qt/100 gal") {
    if (rawAmt >= 4) return { val: (rawAmt/4).toFixed(2), u: "gal" };
    return { val: rawAmt.toFixed(2), u: "qt" };
  }
  if (unit === "gal/100 gal") return { val: rawAmt.toFixed(2), u: "gal" };
  if (unit === "lb/100 gal")  return { val: rawAmt.toFixed(2), u: "lb"  };
  return { val: rawAmt.toFixed(2), u: unit.split("/")[0] };
}

function printFillPlan({ mixItems, estimatedAcres, carrierRate, tankCapacity, grower, fieldName, overrides }) {
  const acres    = parseFloat(estimatedAcres);
  const carrier  = parseFloat(carrierRate);
  const capacity = parseFloat(tankCapacity);
  if (!acres || !carrier || !capacity) return;

  const totalGals   = acres * carrier;
  const fullFills   = Math.floor(totalGals / capacity);
  const partialGals = totalGals - fullFills * capacity;
  const hasPartial  = partialGals > 0.5;

  const perAcreChems   = mixItems.filter(m => m.chemical && m.rate && !m.unit.includes("/100 gal"));
  const per100GalChems = mixItems.filter(m => m.chemical && m.rate && m.unit.includes("/100 gal"));
  const allChems = [...perAcreChems, ...per100GalChems];

  function chemName(item) {
    return item.chemical === "Custom / Other" ? (item.customName || "Custom") : item.chemical;
  }
  function getAmt(item, gals, ovRaw) {
    const isPer100 = item.unit.includes("/100 gal");
    const raw = ovRaw !== undefined ? ovRaw :
      isPer100 ? (parseFloat(item.rate) / 100) * gals : parseFloat(item.rate) * (gals / carrier);
    const fmt = calcFmtAmt(raw, isPer100 ? item.unit.replace("/100 gal", "/ac") : item.unit);
    return { str: fmt.val + " " + fmt.u, rounded: ovRaw !== undefined };
  }

  // Build fill card HTML
  function fillCardHtml(title, gals, fillType, highlight) {
    const fillAcres = (gals / carrier).toFixed(1);
    const rows = allChems.map((item, i) => {
      const ov = overrides && overrides[fillType] && overrides[fillType][i];
      const amt = getAmt(item, gals, ov ? ov.raw : undefined);
      return `<tr>
        <td>${chemName(item)}${item.unit.includes("/100 gal") ? ' <span style="color:#888;font-size:11px">(adj)</span>' : ""}</td>
        <td style="color:#555">${item.rate} ${item.unit}</td>
        <td style="text-align:right;font-weight:bold${amt.rounded ? ";color:#b08020" : ""}">${amt.str}${amt.rounded ? " ✏️" : ""}</td>
      </tr>`;
    }).join("");
    return `
      <div class="fill-card${highlight ? " highlight" : ""}">
        <div class="fill-card-header">
          <span>${title}</span>
          <span>${gals % 1 === 0 ? gals : gals.toFixed(1)} gal &nbsp;·&nbsp; ${fillAcres} acres</span>
        </div>
        <table><thead><tr><th>Chemical</th><th>Rate</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>`;
  }

  // Whole job totals
  const totalRows = allChems.map((item, i) => {
    const isPer100 = item.unit.includes("/100 gal");
    const fullOv = overrides && overrides.full && overrides.full[i];
    const partialOv = overrides && overrides.partial && overrides.partial[i];
    const rawFull = fullOv ? fullOv.raw : (isPer100 ? (parseFloat(item.rate)/100)*capacity : parseFloat(item.rate)*(capacity/carrier));
    const rawPartial = hasPartial ? (partialOv ? partialOv.raw : (isPer100 ? (parseFloat(item.rate)/100)*partialGals : parseFloat(item.rate)*(partialGals/carrier))) : 0;
    const totalRaw = rawFull * fullFills + rawPartial;
    const fmt = calcFmtAmt(totalRaw, isPer100 ? item.unit.replace("/100 gal","/ac") : item.unit);
    const isRounded = fullOv || partialOv;
    return `<tr><td>${chemName(item)}</td><td style="text-align:right;font-weight:bold${isRounded?";color:#b08020":""}">${fmt.val} ${fmt.u}${isRounded?" ✏️":""}</td></tr>`;
  }).join("");

  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Fill Plan — ${grower || "AgSpray"}</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Georgia, serif; color: #111; padding: 36px; max-width: 680px; margin: 0 auto; }
      .header { border-bottom: 3px solid #2a6010; padding-bottom: 14px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
      .title { font-size: 24px; font-weight: bold; color: #1a4010; text-transform: uppercase; letter-spacing: 1px; }
      .subtitle { font-size: 12px; color: #888; margin-top: 3px; }
      .print-date { font-size: 12px; color: #888; }
      .summary-bar { display: flex; gap: 16px; margin-bottom: 24px; }
      .summary-box { flex: 1; border: 1px solid #ccc; border-radius: 8px; padding: 12px; text-align: center; }
      .summary-num { font-size: 28px; font-weight: bold; color: #2a6010; line-height: 1; }
      .summary-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
      .fill-card { border: 2px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
      .fill-card.highlight { border-color: #2a6010; background: #f8fff8; }
      .fill-card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; margin-bottom: 12px; color: #1a4010; text-transform: uppercase; letter-spacing: 0.5px; }
      table { width: 100%; border-collapse: collapse; }
      th { text-align: left; font-size: 11px; color: #888; font-weight: normal; padding: 4px 0; border-bottom: 1px solid #ddd; text-transform: uppercase; letter-spacing: 1px; }
      td { padding: 7px 0; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
      td:last-child { text-align: right; }
      .totals-section { margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; padding: 16px; background: #fafafa; }
      .totals-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #2a6010; margin-bottom: 10px; }
      .footer { margin-top: 36px; padding-top: 10px; border-top: 1px solid #ddd; font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
      .no-print { text-align: center; margin-bottom: 24px; }
      .print-btn { padding: 10px 28px; background: #2a6010; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-right: 8px; }
      .close-btn { padding: 10px 28px; background: transparent; color: #666; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; cursor: pointer; }
      @media print { .no-print { display: none; } }
    </style>
    </head><body>
    <div class="no-print">
      <button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
      <button class="close-btn" onclick="window.close()">Close</button>
    </div>
    <div class="header">
      <div>
        <div class="title">🌿 Fill Plan</div>
        <div class="subtitle">${grower ? grower + (fieldName ? " — " + fieldName : "") : "AgSpray Log"}</div>
      </div>
      <div class="print-date">${new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</div>
    </div>

    <div class="summary-bar">
      <div class="summary-box"><div class="summary-num">${acres}</div><div class="summary-label">Est. Acres</div></div>
      <div class="summary-box"><div class="summary-num">${totalGals.toFixed(0)}</div><div class="summary-label">Total Gals</div></div>
      <div class="summary-box"><div class="summary-num">${fullFills}</div><div class="summary-label">Full Fills</div></div>
      <div class="summary-box"><div class="summary-num" style="color:${hasPartial?"#b08020":"#aaa"}">${hasPartial?1:0}</div><div class="summary-label">Partial Fill</div></div>
    </div>

    ${fullFills > 0 ? fillCardHtml(`Full Fill (×${fullFills}) — ${capacity} gal each`, capacity, "full", true) : ""}
    ${hasPartial ? fillCardHtml(`Partial Fill — ${partialGals.toFixed(1)} gal`, partialGals, "partial", false) : ""}

    <div class="totals-section">
      <div class="totals-title">Whole Job Totals</div>
      <table><tbody>${totalRows}</tbody></table>
    </div>

    <div class="footer">
      <span>AgSpray Log — Fill Plan printed ${new Date().toLocaleString()}</span>
      <span>Carrier: ${carrierRate} gal/ac &nbsp;·&nbsp; Tank: ${capacity} gal</span>
    </div>
    </body></html>`);
  win.document.close();
}

function FillPlan({ mixItems, setMixItems, estimatedAcres, carrierRate, tankCapacity, readOnly, grower, fieldName }) {
  const acres    = parseFloat(estimatedAcres);
  const carrier  = parseFloat(carrierRate);
  const capacity = parseFloat(tankCapacity);

  // overrides: { full: { chemIdx: "2.5 gal" }, partial: { chemIdx: "1.2 gal" } }
  const [overrides, setOverrides] = useState({ full: {}, partial: {} });
  const [editing, setEditing] = useState(null); // { fill: "full"|"partial", idx: number }
  const [editVal, setEditVal] = useState("");

  if (!acres || !carrier || !capacity || acres <= 0 || carrier <= 0 || capacity <= 0) return null;

  const totalGals   = acres * carrier;
  const fullFills   = Math.floor(totalGals / capacity);
  const partialGals = totalGals - fullFills * capacity;
  const hasPartial  = partialGals > 0.5;

  const perAcreChems   = mixItems.filter(m => m.chemical && m.rate && !m.unit.includes("/100 gal"));
  const per100GalChems = mixItems.filter(m => m.chemical && m.rate && m.unit.includes("/100 gal"));

  function chemName(item) {
    return item.chemical === "Custom / Other" ? (item.customName || "Custom") : item.chemical;
  }

  // Convert a raw amount (in base units) to display { val, u }
  function fmtAmt(raw, unit) { return calcFmtAmt(raw, unit); }

  // Get the raw calculated amount for a per-acre chem in a given fill (gallons)
  function calcRawForGals(item, gals) {
    return parseFloat(item.rate) * (gals / carrier);
  }
  function calcRawPer100(item, gals) {
    return (parseFloat(item.rate) / 100) * gals;
  }


  // Back-calculate rate from overridden raw amount for a fill
  function backCalcRate(rawAmt, unit, gals) {
    if (unit.includes("/100 gal")) return (rawAmt * 100) / gals;
    return rawAmt / (gals / carrier);
  }

  // When user commits an override, store it and back-calc the rate in mixItems
  const commitOverride = (fillType, chemIdx, numStr, gals) => {
    const item = [...perAcreChems, ...per100GalChems][chemIdx];
    const num = parseFloat(numStr);
    if (isNaN(num) || num <= 0) { cancelEdit(); return; }

    // Convert displayed unit number back to raw base units
    const dispUnit = editing ? editing.unit : "";
    let raw = num;
    const baseUnit = item.unit.replace("/100 gal", "/ac");
    if (baseUnit === "oz/ac" || baseUnit === "fl oz/ac") {
      if (dispUnit === "gal") raw = num * 128;
      else if (dispUnit === "pt") raw = num * 16;
    } else if (baseUnit === "pt/ac") {
      if (dispUnit === "gal") raw = num * 8;
    } else if (baseUnit === "qt/ac") {
      if (dispUnit === "gal") raw = num * 4;
    }

    setOverrides(o => ({ ...o, [fillType]: { ...o[fillType], [chemIdx]: { raw, dispUnit } } }));

    const newRate = backCalcRate(raw, item.unit, gals);
    const globalIdx = mixItems.findIndex(m => m.chemical === item.chemical && m.unit === item.unit && m.rate === item.rate);
    if (globalIdx >= 0) {
      setMixItems(mixItems.map((m, i) => i === globalIdx ? { ...m, rate: parseFloat(newRate.toFixed(4)).toString() } : m));
    }
    cancelEdit();
  };

  const cancelEdit = () => { setEditing(null); setEditVal(""); };

  const startEdit = (fill, idx, currentVal, currentU) => {
    setEditing({ fill, idx, unit: currentU });
    setEditVal(currentVal);
  };

  // Get display amount for a chem in a fill, respecting overrides
  function getDisplayAmt(fillType, chemIdx, item, gals) {
    const ov = overrides[fillType][chemIdx];
    if (ov) {
      const fmt = fmtAmt(ov.raw, item.unit.includes("/100 gal") ? item.unit.replace("/100 gal","/ac") : item.unit);
      return { ...fmt, rounded: true };
    }
    const raw = item.unit.includes("/100 gal") ? calcRawPer100(item, gals) : calcRawForGals(item, gals);
    return { ...fmtAmt(raw, item.unit.includes("/100 gal") ? item.unit.replace("/100 gal","/ac") : item.unit), rounded: false };
  }

  const allChems = [...perAcreChems, ...per100GalChems];

  const FillCard = ({ fillType, title, gals, highlight }) => {
    const fillAcres = gals / carrier;
    return (
      <div style={{ background: highlight ? "#0f2a0f" : "#0f1a0f", border: "2px solid " + (highlight ? "#4a8c2a" : "#2d4a2d"), borderRadius: 10, padding: 14, marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, color: highlight ? "#c8e6a0" : "#8aaa70", textTransform: "uppercase", letterSpacing: 0.5 }}>{title}</div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 800, color: highlight ? "#4a8c2a" : "#7aaa50", lineHeight: 1 }}>{gals % 1 === 0 ? gals : gals.toFixed(1)} gal</div>
            <div style={{ fontSize: 11, color: "#4a6a4a" }}>{fillAcres % 1 === 0 ? fillAcres : fillAcres.toFixed(1)} acres</div>
          </div>
        </div>
        {allChems.map((item, i) => {
          const isPer100 = item.unit.includes("/100 gal");
          const amt = getDisplayAmt(fillType, i, item, gals);
          const isEditing = editing && editing.fill === fillType && editing.idx === i;
          return (
            <div key={i} style={{ borderTop: "1px solid #1f351f", padding: "6px 0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 13, color: "#8aaa70", flex: 1 }}>
                  {chemName(item)}{isPer100 && <span style={{ color: "#4a6a4a", fontSize: 11 }}> (adj)</span>}
                </span>
                {!isEditing && (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 17, fontWeight: 700, color: amt.rounded ? "#d4aa40" : "#c8e6a0" }}>
                      {amt.val} <span style={{ fontSize: 12, color: "#7aaa50", fontWeight: 400 }}>{amt.u}</span>
                      {amt.rounded && <span style={{ fontSize: 10, color: "#d4aa40", marginLeft: 4 }}>✏️</span>}
                    </span>
                    {!readOnly && (
                      <button
                        onClick={() => startEdit(fillType, i, amt.val, amt.u)}
                        style={{ background: "transparent", border: "1px solid #2d4a2d", color: "#7aaa50", padding: "2px 7px", borderRadius: 4, cursor: "pointer", fontSize: 11, fontFamily: "'Barlow', sans-serif", flexShrink: 0 }}
                      >round</button>
                    )}
                  </div>
                )}
              </div>
              {!readOnly && isEditing && (
                <div style={{ marginTop: 6, display: "flex", gap: 6, alignItems: "center" }}>
                  <input
                    autoFocus
                    type="number"
                    value={editVal}
                    onChange={e => setEditVal(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") commitOverride(fillType, i, editVal, gals); if (e.key === "Escape") cancelEdit(); }}
                    placeholder={amt.val}
                    style={{ width: 90, padding: "6px 10px", fontSize: 15 }}
                  />
                  <span style={{ color: "#c8e6a0", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, flexShrink: 0 }}>{editing.unit}</span>
                  <button className="save-inline-btn" style={{ padding: "6px 12px", fontSize: 13 }} onClick={() => commitOverride(fillType, i, editVal, gals)}>Set</button>
                  <button className="cancel-inline-btn" onClick={cancelEdit}>✕</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  const hasMixChems = allChems.length > 0;

  return (
    <div style={{ background: "#1a2e1a", border: "2px solid #4a8c2a", borderRadius: 12, padding: 16, marginTop: 16, marginBottom: 4 }}>
      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 14, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#7aaa50", marginBottom: 12, paddingBottom: 8, borderBottom: "1px solid #2d4a2d" }}>
        📊 Fill Plan
      </div>

      {/* Summary row */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 80, background: "#0f1a0f", border: "1px solid #2d4a2d", borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 28, fontWeight: 800, color: "#c8e6a0", lineHeight: 1 }}>{totalGals % 1 === 0 ? totalGals : totalGals.toFixed(0)}</div>
          <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase" }}>Total Gals</div>
        </div>
        <div style={{ flex: 1, minWidth: 80, background: "#0f1a0f", border: "1px solid #2d4a2d", borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 28, fontWeight: 800, color: "#4a8c2a", lineHeight: 1 }}>{fullFills}</div>
          <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase" }}>Full Fills</div>
        </div>
        <div style={{ flex: 1, minWidth: 80, background: "#0f1a0f", border: "1px solid " + (hasPartial ? "#5a7a2a" : "#2d4a2d"), borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 28, fontWeight: 800, color: hasPartial ? "#d4aa40" : "#4a6a4a", lineHeight: 1 }}>{hasPartial ? 1 : 0}</div>
          <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase" }}>Partial Fill</div>
        </div>
      </div>

      {hasMixChems && (
        <div>
          {fullFills > 0 && <FillCard fillType="full" title={`Full Fill (×${fullFills})`} gals={capacity} highlight={true} />}
          {hasPartial && <FillCard fillType="partial" title="Partial Fill" gals={partialGals} highlight={false} />}

          {/* Whole job totals */}
          <div style={{ background: "#0a150a", border: "1px solid #2d4a2d", borderRadius: 8, padding: 12, marginTop: 4 }}>
            <div style={{ fontSize: 12, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700 }}>Whole Job Totals</div>
            {allChems.map((item, i) => {
              const isPer100 = item.unit.includes("/100 gal");
              const fmtUnit = isPer100 ? item.unit.replace("/100 gal", "/ac") : item.unit;

              // Use overridden raw amounts if set, otherwise calculate
              const fullOv = overrides.full[i];
              const partialOv = overrides.partial[i];

              const rawPerFull = fullOv ? fullOv.raw : (isPer100 ? calcRawPer100(item, capacity) : calcRawForGals(item, capacity));
              const rawPartial = hasPartial ? (partialOv ? partialOv.raw : (isPer100 ? calcRawPer100(item, partialGals) : calcRawForGals(item, partialGals))) : 0;

              const totalRaw = (rawPerFull * fullFills) + rawPartial;
              const amt = fmtAmt(totalRaw, fmtUnit);
              const isRounded = fullOv || partialOv;
              return (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0", borderTop: "1px solid #1a2a1a" }}>
                  <span style={{ fontSize: 13, color: "#8aaa70" }}>{chemName(item)}{isPer100 && <span style={{ color: "#4a6a4a", fontSize: 11 }}> (adj)</span>}</span>
                  <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, fontWeight: 700, color: isRounded ? "#d4aa40" : "#c8e6a0" }}>
                    {amt.val} <span style={{ fontSize: 12, color: "#7aaa50", fontWeight: 400 }}>{amt.u}</span>
                    {isRounded && <span style={{ fontSize: 10, color: "#d4aa40", marginLeft: 4 }}>✏️</span>}
                  </span>
                </div>
              );
            })}
          </div>
          {!readOnly && (
            <div style={{ fontSize: 11, color: "#4a6a4a", textAlign: "center", marginTop: 8 }}>
              Tap "round" on any amount to adjust it — rate will update automatically
            </div>
          )}
          <button
            onClick={() => printFillPlan({ mixItems, estimatedAcres, carrierRate, tankCapacity, overrides, grower, fieldName })}
            style={{ width: "100%", marginTop: 12, padding: "10px", borderRadius: 8, border: "1px solid #2d4a2d", background: "transparent", color: "#7aaa50", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 15, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, cursor: "pointer" }}
          >
            🖨 Print Fill Plan
          </button>
        </div>
      )}
      {!hasMixChems && (
        <div style={{ textAlign: "center", color: "#4a6a4a", fontSize: 13, padding: "8px 0" }}>Add chemicals above to see amounts per fill</div>
      )}
    </div>
  );
}

function DriverForm() {
  const savedCapacity = localStorage.getItem("agspray_tank_capacity") || "1200";
  const [form, setForm] = useState({ grower: "", date: new Date().toISOString().slice(0,10), carrier: "", carrierRate: "", notes: "", truckDriver: "", estimatedAcres: "" });
  const [fields, setFields] = useState([""]);
  const [tankCapacity, setTankCapacity] = useState(savedCapacity);
  const [editingCapacity, setEditingCapacity] = useState(false);
  const [mixItems, setMixItems] = useState([{ chemical: "", rate: "", unit: "oz/ac" }]);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [error, setError] = useState("");
  const sf = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const addField = () => setFields(f => [...f, ""]);
  const removeField = i => setFields(f => f.filter((_, idx) => idx !== i));
  const setFieldVal = (i, v) => setFields(f => f.map((x, idx) => idx === i ? v : x));
  const fieldDisplay = fields.filter(f => f.trim()).join(", ");

  const saveCapacity = (val) => {
    setTankCapacity(val);
    localStorage.setItem("agspray_tank_capacity", val);
    setEditingCapacity(false);
  };

  const submit = async () => {
    if (!fields[0].trim() || !form.grower || !form.truckDriver) { setError("Please fill in at least one Field, Grower, and Truck Driver."); return; }
    setSaving(true); setError("");
    try {
      await dbInsert({ id: genId(), created_at: Date.now(), status: "pending", billed: false, billed_at: null, completed_at: null, field_name: fieldDisplay, grower: form.grower, date: form.date, tank_size: tankCapacity, carrier: form.carrier, carrier_rate: form.carrierRate, total_gals: "", notes: form.notes, truck_driver: form.truckDriver, mix_items: mixItems, acres: form.estimatedAcres || "", applicator: "", applicator_notes: "", tank_fills: [], acres_edited_by: null, acres_edited_at: null });
      setSaved(true);
    } catch(e) { setError("Failed to save. Check your connection."); }
    setSaving(false);
  };

  const reset = () => { setForm({ grower: "", date: new Date().toISOString().slice(0,10), carrier: "", carrierRate: "", notes: "", truckDriver: "", estimatedAcres: "" }); setFields([""]); setMixItems([{ chemical: "", rate: "", unit: "oz/ac" }]); setSaved(false); setError(""); };

  if (saved) return (
    <div>
      <div className="success-banner">✓ Mix Record Saved!</div>
      <p style={{ color: "#8aaa70", textAlign: "center", marginBottom: 24, fontSize: 14 }}>Record is live — applicator can view it instantly.</p>
      <button className="btn btn-primary" onClick={reset}>+ New Mix Record</button>
    </div>
  );

  return (
    <div>
      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 24, fontWeight: 800, textTransform: "uppercase", color: "#c8e6a0", letterSpacing: 1, marginBottom: 4 }}>New Mix Record</div>
      <div style={{ color: "#7aaa50", fontSize: 13, marginBottom: 18 }}>Truck Driver Entry</div>
      {error && <div className="error-banner">{error}</div>}

      {/* Tank capacity setting */}
      <div style={{ background: "#1a2e1a", border: "1px solid #2d4a2d", borderRadius: 8, padding: "10px 14px", marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <div>
          <div style={{ fontSize: 11, color: "#7aaa50", letterSpacing: 1, textTransform: "uppercase", fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700 }}>Sprayer Capacity</div>
          {editingCapacity ? (
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
              <input type="number" defaultValue={tankCapacity} id="cap-input" style={{ width: 90, padding: "5px 8px", fontSize: 14 }} />
              <span style={{ color: "#7aaa50", fontSize: 13 }}>gal</span>
              <button className="save-inline-btn" style={{ padding: "5px 12px", fontSize: 13 }} onClick={() => saveCapacity(document.getElementById("cap-input").value)}>Save</button>
              <button className="cancel-inline-btn" onClick={() => setEditingCapacity(false)}>✕</button>
            </div>
          ) : (
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 20, fontWeight: 800, color: "#c8e6a0" }}>{tankCapacity} gal</div>
          )}
        </div>
        {!editingCapacity && <button className="edit-icon-btn" onClick={() => setEditingCapacity(true)}>✏️ Change</button>}
      </div>

      <div className="section-label">📋 Job Info</div>
      <input placeholder="Grower / Customer *" value={form.grower} onChange={e => sf("grower", e.target.value)} style={{ marginBottom: 8 }} />
      <input placeholder="Truck Driver Name *" value={form.truckDriver} onChange={e => sf("truckDriver", e.target.value)} style={{ marginBottom: 8 }} />
      <div className="input-row" style={{ marginBottom: 8 }}>
        <input type="date" value={form.date} onChange={e => sf("date", e.target.value)} />
        <input placeholder="Est. Acres" type="number" value={form.estimatedAcres || ""} onChange={e => sf("estimatedAcres", e.target.value)} />
      </div>

      <div className="section-label">🌾 Fields</div>
      {fields.map((f, i) => (
        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
          <input
            placeholder={i === 0 ? "Field name *" : "Field name"}
            value={f}
            onChange={e => setFieldVal(i, e.target.value)}
            style={{ flex: 1 }}
          />
          {fields.length > 1 && (
            <button className="remove-btn" style={{ position: "static", flexShrink: 0 }} onClick={() => removeField(i)}>✕</button>
          )}
        </div>
      ))}
      <button className="btn btn-secondary" style={{ marginBottom: 0, fontSize: 14, padding: 10 }} onClick={addField}>+ Add Field</button>

      <div className="section-label">🛢 Fill Mix</div>
      <div className="input-row">
        <select value={form.carrier} onChange={e => sf("carrier", e.target.value)}>
          <option value="">Carrier</option>
          {CARRIERS.map(c => <option key={c}>{c}</option>)}
        </select>
        <input placeholder="Carrier Rate (gal/ac)" value={form.carrierRate} onChange={e => sf("carrierRate", e.target.value)} />
      </div>

      <div className="section-label">🧪 Chemicals in Mix</div>
      <MixEditor items={mixItems} setItems={setMixItems} />

      {/* Fill Plan — shows as soon as acres + carrier rate are entered */}
      <FillPlan
        mixItems={mixItems}
        setMixItems={setMixItems}
        estimatedAcres={form.estimatedAcres}
        carrierRate={form.carrierRate}
        tankCapacity={tankCapacity}
        grower={form.grower}
        fieldName={fields.filter(f => f.trim()).join(", ")}
      />

      <div className="section-label">📝 Notes</div>
      <textarea placeholder="Additional notes, field conditions, etc." value={form.notes} onChange={e => sf("notes", e.target.value)} />
      <div className="divider" />
      <button className="btn btn-primary" onClick={submit} disabled={saving}>{saving ? "Saving..." : "Save Mix Record →"}</button>
    </div>
  );
}
